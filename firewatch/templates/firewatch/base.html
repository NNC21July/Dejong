<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FIREWATCH Dashboard</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@600;700&display=swap');

    :root {
      --bg-0: #07141f;
      --bg-1: #0d2030;
      --bg-2: #132b40;
      --panel: #f7fbff;
      --panel-2: #edf4fa;
      --ink: #0e1f2f;
      --accent: #f45d2d;
      --accent-2: #ff7f50;
      --muted: #5a6f82;
      --warn: #b4232a;
      --ok: #158560;
      --line: #cdd9e5;
      --chip: #dbe8f3;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Plus Jakarta Sans", "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(1000px 500px at 95% -10%, rgba(244, 93, 45, 0.25), transparent 60%),
        radial-gradient(900px 450px at -10% -15%, rgba(66, 143, 255, 0.2), transparent 62%),
        linear-gradient(145deg, var(--bg-0), var(--bg-1) 45%, var(--bg-2));
      background-size: 120% 120%, 120% 120%, 100% 100%;
      min-height: 100vh;
      animation: atmosphereDrift 14s ease-in-out infinite alternate;
    }

    .container {
      width: min(1160px, 93vw);
      margin: 28px auto 52px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
    }

    .title {
      font-family: "Space Grotesk", "Plus Jakarta Sans", sans-serif;
      font-size: 2.25rem;
      letter-spacing: 0.08em;
      font-weight: 700;
      position: relative;
      display: inline-block;
      background: linear-gradient(90deg, #f6fbff, #8fd3ff, #ffd2b8, #f6fbff);
      background-size: 220% auto;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 22px rgba(143, 211, 255, 0.12);
      animation: titleSweep 4.8s linear infinite;
    }

    .title::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: -4px;
      height: 2px;
      border-radius: 999px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.9), rgba(244,93,45,.95), transparent);
      background-size: 200% auto;
      animation: titleLine 2.8s ease-in-out infinite;
    }

    .subtitle {
      color: #b4c6d8;
      font-size: 0.92rem;
      margin-top: 4px;
      font-weight: 500;
    }

    .panel {
      background: linear-gradient(180deg, var(--panel), var(--panel-2));
      border: 1px solid rgba(255, 255, 255, 0.7);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 14px;
      box-shadow: 0 12px 26px rgba(7, 20, 31, 0.24);
      backdrop-filter: blur(2px);
      opacity: 0;
      transform: translateY(10px) scale(0.995);
      animation: panelReveal .5s ease forwards;
    }

    .badge {
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 0.74rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      border: 1px solid var(--line);
      display: inline-block;
      margin-right: 6px;
      background: var(--chip);
      color: #12314b;
    }

    .btn {
      border: 1px solid transparent;
      border-radius: 10px;
      padding: 8px 13px;
      text-decoration: none;
      color: #fff;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      display: inline-block;
      cursor: pointer;
      font-size: .9rem;
      font-weight: 700;
      transition: transform .12s ease, box-shadow .2s ease, filter .2s ease;
      box-shadow: 0 6px 14px rgba(244, 93, 45, 0.28);
    }

    .btn:hover {
      transform: translateY(-1px);
      filter: brightness(1.03);
    }
    .btn:active { transform: translateY(0); }

    .btn.secondary {
      background: linear-gradient(135deg, #2c4963, #1f3447);
      box-shadow: 0 6px 14px rgba(13, 32, 48, 0.25);
    }

    .btn.warn { background: linear-gradient(135deg, #ce3030, var(--warn)); }
    .btn.ok { background: linear-gradient(135deg, #2aae82, var(--ok)); }
    .btn + .btn { margin-left: 6px; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.92rem;
      overflow: hidden;
      border-radius: 10px;
    }

    th, td {
      text-align: left;
      padding: 10px 8px;
      border-bottom: 1px solid var(--line);
      vertical-align: top;
    }

    th {
      color: #213f58;
      font-weight: 700;
      font-size: .82rem;
      letter-spacing: .04em;
      text-transform: uppercase;
      background: rgba(21, 56, 84, 0.06);
    }

    tbody tr:hover { background: rgba(31, 75, 112, 0.06); }

    .grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 14px;
    }

    .small { color: var(--muted); font-size: .84rem; }

    .metrics {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .metric {
      border: 1px solid var(--line);
      border-radius: 9px;
      padding: 8px;
      background: #f8fcff;
    }

    form.inline { display: inline; }

    input, select {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 6px 8px;
      margin-right: 8px;
      font-size: .9rem;
      background: #fff;
      color: #173349;
      font-family: "Plus Jakarta Sans", "Segoe UI", sans-serif;
    }

    h3 {
      margin-top: 0;
      font-family: "Space Grotesk", "Plus Jakarta Sans", sans-serif;
      letter-spacing: .02em;
      color: #132f47;
    }

    pre {
      background: #0f2030;
      color: #d9ecff;
      border-radius: 10px;
      padding: 10px;
      overflow: auto;
      font-size: .8rem;
    }

    @keyframes titleSweep {
      from { background-position: 0% center; }
      to { background-position: 220% center; }
    }

    @keyframes titleLine {
      0% { background-position: 0% center; opacity: .7; }
      50% { background-position: 100% center; opacity: 1; }
      100% { background-position: 0% center; opacity: .7; }
    }

    @keyframes panelReveal {
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes atmosphereDrift {
      0% { background-position: 0% 0%, 100% 0%, 0 0; }
      100% { background-position: 8% 4%, 92% 6%, 0 0; }
    }

    @media (max-width: 840px) {
      .grid { grid-template-columns: 1fr; }
      .metrics { grid-template-columns: 1fr 1fr; }
      table { font-size: .85rem; }
      .title { font-size: 1.9rem; }
    }

    .global-urgent-overlay {
      position: fixed;
      inset: 0;
      z-index: 2400;
      display: none;
      place-items: center;
      background: rgba(10, 14, 20, 0.76);
      backdrop-filter: blur(2px);
    }
    .global-urgent-overlay.show { display: grid; }
    .global-urgent-card {
      width: min(760px, 94vw);
      border-radius: 20px;
      border: 3px solid #f2994a;
      background: radial-gradient(circle at 30% 20%, #4b290a, #1d1105 68%);
      color: #fff3e4;
      padding: 24px;
      box-shadow: 0 28px 70px rgba(0,0,0,.55);
      animation: globalUrgentPop .2s ease-out, globalHazardPulse .95s ease-in-out infinite;
    }
    .global-urgent-card.hazard {
      border-color: #f2994a;
      background: radial-gradient(circle at 30% 20%, #4b290a, #1d1105 68%);
      color: #fff3e4;
      animation: globalUrgentPop .2s ease-out, globalHazardPulse .95s ease-in-out infinite;
    }
    .global-urgent-card.emergency {
      border-color: #ff4f4f;
      background: radial-gradient(circle at 30% 20%, #3f1212, #170b0b 68%);
      color: #fff1f1;
      animation: globalUrgentPop .2s ease-out, globalEmergencyPulse .5s ease-in-out infinite, globalUrgentShake .32s linear infinite;
    }
    .global-urgent-title {
      font-family: "Space Grotesk", "Plus Jakarta Sans", sans-serif;
      font-size: clamp(1.7rem, 4vw, 2.6rem);
      font-weight: 800;
      letter-spacing: .06em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .global-urgent-meta { font-size: 1.08rem; opacity: .96; }
    .global-urgent-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 14px;
      flex-wrap: wrap;
    }
    @keyframes globalUrgentPop {
      from { opacity: 0; transform: scale(.9); }
      to { opacity: 1; transform: scale(1); }
    }
    @keyframes globalHazardPulse {
      0% { box-shadow: 0 0 0 0 rgba(242, 201, 76, .32), 0 28px 70px rgba(0,0,0,.55); }
      50% { box-shadow: 0 0 0 12px rgba(242, 201, 76, .08), 0 28px 70px rgba(0,0,0,.55); }
      100% { box-shadow: 0 0 0 0 rgba(242, 201, 76, .32), 0 28px 70px rgba(0,0,0,.55); }
    }
    @keyframes globalEmergencyPulse {
      0% { box-shadow: 0 0 0 0 rgba(255, 79, 79, .45), 0 28px 70px rgba(0,0,0,.55); }
      50% { box-shadow: 0 0 0 16px rgba(255, 79, 79, .08), 0 28px 70px rgba(0,0,0,.55); }
      100% { box-shadow: 0 0 0 0 rgba(255, 79, 79, .45), 0 28px 70px rgba(0,0,0,.55); }
    }
    @keyframes globalUrgentShake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-2px); }
      50% { transform: translateX(2px); }
      75% { transform: translateX(-2px); }
    }
  </style>
</head>
<body>
  <div id="globalUrgentOverlay" class="global-urgent-overlay">
    <div class="global-urgent-card" id="globalUrgentCard">
      <div class="global-urgent-title" id="globalUrgentTitle">Emergency Alert</div>
      <div class="global-urgent-meta" id="globalUrgentMeta">Zone - Camera</div>
      <div class="global-urgent-actions">
        <button class="btn secondary" id="globalUrgentDismissBtn" type="button">Dismiss</button>
        <a class="btn warn" id="globalUrgentOpenBtn" href="#">Open Footage</a>
      </div>
    </div>
  </div>

  <div class="container">
    <div class="topbar">
      <div>
        <div class="title">FIREWATCH</div>
        <div class="subtitle">Context-Aware Fire Verification System</div>
      </div>
      <div style="display:flex; gap:8px; align-items:center;">
        <a class="btn secondary" href="{% url 'firewatch:dashboard_home' %}">Home</a>
        <a class="btn secondary" href="{% url 'firewatch:admin_page' %}">Admin</a>
      </div>
    </div>

    {% if messages %}
      {% for message in messages %}
        <div class="panel">{{ message }}</div>
      {% endfor %}
    {% endif %}

    {% block content %}{% endblock %}
  </div>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const panels = document.querySelectorAll(".panel");
      panels.forEach((panel, i) => {
        panel.style.animationDelay = `${Math.min(i * 70, 600)}ms`;
      });

      const overlay = document.getElementById("globalUrgentOverlay");
      const card = document.getElementById("globalUrgentCard");
      const title = document.getElementById("globalUrgentTitle");
      const meta = document.getElementById("globalUrgentMeta");
      const openBtn = document.getElementById("globalUrgentOpenBtn");
      const dismissBtn = document.getElementById("globalUrgentDismissBtn");
      const seen = new Set(JSON.parse(sessionStorage.getItem("fw_seen_risk_alerts") || "[]"));

      const persistSeen = () => {
        sessionStorage.setItem("fw_seen_risk_alerts", JSON.stringify(Array.from(seen).slice(-120)));
      };

      const normalizeRisk = (value) => {
        const v = String(value || "").toLowerCase();
        if (v.includes("emergency")) return "emergency";
        if (v.includes("hazard")) return "hazard";
        return "";
      };

      const showGlobalRisk = (n) => {
        const kind = normalizeRisk(n.risk_label);
        if (!kind) return;
        card.classList.remove("hazard", "emergency");
        card.classList.add(kind);
        title.textContent = kind === "emergency" ? "EMERGENCY ALERT" : "HAZARD ALERT";
        meta.textContent = `Zone ${n.zone} | Camera ${n.camera_id}`;
        openBtn.href = n.detail_url || "/";
        overlay.classList.add("show");
      };

      dismissBtn.addEventListener("click", () => overlay.classList.remove("show"));
      overlay.addEventListener("click", (e) => { if (e.target === overlay) overlay.classList.remove("show"); });

      const pollRiskAlerts = async () => {
        try {
          const res = await fetch(`/api/dashboard/live-state/?ts=${Date.now()}`, { cache: "no-store" });
          if (!res.ok) return;
          const data = await res.json();
          const alerts = data.active_notifications || [];
          for (const n of alerts) {
            const risk = normalizeRisk(n.risk_label);
            if (!risk) continue;
            const key = `${n.event_id}|${n.risk_label}|${n.zone}|${n.camera_id}`;
            if (seen.has(key)) continue;
            seen.add(key);
            persistSeen();
            showGlobalRisk(n);
            break;
          }
        } catch (e) {
          // no-op
        }
      };

      pollRiskAlerts();
      setInterval(pollRiskAlerts, 2500);
    });
  </script>
</body>
</html>
